<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef0fd"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>

  <!-- left: SEO bars -->
  <g transform="translate(120,150)">
    <rect x="0" y="120" width="26" height="60" rx="4" fill="#4338ca" opacity="0.35"/>
    <rect x="40" y="80" width="26" height="100" rx="4" fill="#4338ca" opacity="0.55"/>
    <rect x="80" y="40" width="26" height="140" rx="4" fill="#4338ca" opacity="0.8"/>
    <rect x="120" y="90" width="26" height="90" rx="4" fill="#4338ca" opacity="0.5"/>
    <text x="0" y="215" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#312e81" opacity="0.6">SEO</text>
  </g>

  <!-- divider -->
  <line x1="400" y1="90" x2="400" y2="360" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6 8" opacity="0.5"/>

  <!-- right: GEO network -->
  <g transform="translate(470,120)" stroke="#059669" stroke-width="1.5" opacity="0.4">
    <line x1="0" y1="60" x2="80" y2="20"/>
    <line x1="80" y1="20" x2="160" y2="70"/>
    <line x1="80" y1="20" x2="60" y2="140"/>
    <line x1="160" y1="70" x2="140" y2="170"/>
    <line x1="60" y1="140" x2="140" y2="170"/>
  </g>
  <g transform="translate(470,120)" fill="#059669">
    <circle cx="0" cy="60" r="6" opacity="0.5"/>
    <circle cx="80" cy="20" r="9" opacity="0.8"/>
    <circle cx="160" cy="70" r="7" opacity="0.6"/>
    <circle cx="60" cy="140" r="6" opacity="0.5"/>
    <circle cx="140" cy="170" r="8" opacity="0.7"/>
  </g>
  <text x="470" y="335" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#065f46" opacity="0.6">GEO</text>
</svg>
