    <g fill="#4338ca">
      <path d="M24 24 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 Z"/>
    </g>
    <rect x="48" y="20" width="90" height="12" rx="6" fill="#4338ca" opacity="0.55"/>
    <rect x="24" y="52" width="352" height="10" rx="5" fill="#c7d2fe"/>
