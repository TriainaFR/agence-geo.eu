<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparatif des agences SEO à Paris en 2026">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="42%" stop-color="#4338ca"/>
      <stop offset="78%" stop-color="#8b8ad6"/>
      <stop offset="100%" stop-color="#e8c9a8"/>
    </linearGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6e4cf" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f4d9b8" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4e2"/>
      <stop offset="55%" stop-color="#fcd9a8"/>
      <stop offset="100%" stop-color="#fcd9a8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Setting sun glow -->
  <circle cx="1120" cy="560" r="240" fill="url(#sun)"/>
  <circle cx="1120" cy="560" r="70" fill="#fff1dc" opacity="0.9"/>

  <!-- Stars -->
  <g fill="#eef0fd">
    <circle cx="160" cy="120" r="2.5" opacity="0.9"/>
    <circle cx="380" cy="80" r="1.8" opacity="0.7"/>
    <circle cx="560" cy="150" r="2" opacity="0.6"/>
    <circle cx="900" cy="90" r="2.2" opacity="0.8"/>
    <circle cx="1280" cy="130" r="1.8" opacity="0.6"/>
    <circle cx="1460" cy="70" r="2.4" opacity="0.85"/>
    <circle cx="1380" cy="230" r="1.6" opacity="0.5"/>
    <circle cx="250" cy="240" r="1.6" opacity="0.5"/>
  </g>

  <!-- Far skyline layer -->
  <g fill="#3f3a99" opacity="0.55">
    <path d="M0 640 h120 v-40 h60 v40 h90 v-70 h50 v70 h140 v-30 h70 v30 h180 v-55 h60 v55 h300 v-40 h80 v40 h220 v900 H0 Z"/>
  </g>

  <!-- Mid skyline (Haussmann rooftops) -->
  <g fill="#312e81" opacity="0.8">
    <path d="M0 720 h90 v-46 h140 v46 h70 v-30 h110 v30 h120 v-60 h130 v60 h160 v-40 h150 v40 h120 v-52 h140 v52 h140 v900 H0 Z"/>
    <!-- chimneys -->
    <rect x="150" y="660" width="10" height="16"/>
    <rect x="172" y="656" width="10" height="20"/>
    <rect x="470" y="646" width="9" height="18"/>
    <rect x="900" y="668" width="9" height="18"/>
    <rect x="1230" y="656" width="10" height="20"/>
  </g>

  <!-- Eiffel Tower -->
  <g transform="translate(690,250)" stroke="#12102e" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- spire -->
    <path d="M110 0 v34"/>
    <!-- silhouette legs -->
    <path d="M110 34 C 96 150 70 300 34 470 M110 34 C 124 150 150 300 186 470"/>
    <!-- top platform -->
    <path d="M92 130 h36"/>
    <!-- second platform -->
    <path d="M74 300 q36 34 72 0"/>
    <!-- lower arch -->
    <path d="M50 400 q60 44 120 0"/>
    <!-- base line -->
    <path d="M34 470 h152"/>
    <!-- cross bracing (light) -->
    <path d="M78 200 L142 200 M70 260 L150 260" stroke-width="4" opacity="0.7"/>
  </g>
  <!-- warm ground haze -->
  <rect x="0" y="700" width="1600" height="200" fill="url(#haze)"/>

  <!-- Foreground skyline -->
  <g fill="#0d0b24">
    <path d="M0 790 h150 v-40 h120 v40 h90 v-64 h110 v64 h150 v-34 h120 v34 h180 v-56 h130 v56 h150 v-40 h130 v40 h140 v170 H0 Z"/>
  </g>

  <!-- Title -->
  <text x="130" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-style="italic" font-weight="600" fill="#f6f5f1">Agences SEO</text>
  <text x="134" y="250" font-family="Arial, Helvetica, sans-serif" font-size="26" letter-spacing="10" fill="#c7d2fe">PARIS · COMPARATIF 2026</text>
</svg>
