<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparatif des agences SEO à Paris">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef0fd"/>
      <stop offset="100%" stop-color="#e2e6f7"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- podium bars (classement) -->
  <g transform="translate(1080,250)">
    <rect x="0" y="360" width="140" height="180" rx="6" fill="#c7d2fe"/>
    <rect x="170" y="220" width="140" height="320" rx="6" fill="url(#ink)"/>
    <rect x="340" y="410" width="140" height="130" rx="6" fill="#c7d2fe"/>
    <text x="240" y="195" font-family="Georgia, serif" font-size="46" font-style="italic" fill="#3730a3" text-anchor="middle" font-weight="600">1</text>
    <text x="70" y="345" font-family="Georgia, serif" font-size="34" font-style="italic" fill="#6a6774" text-anchor="middle">2</text>
    <text x="410" y="395" font-family="Georgia, serif" font-size="34" font-style="italic" fill="#6a6774" text-anchor="middle">3</text>
  </g>

  <!-- Tour Eiffel stylisée -->
  <g transform="translate(300,180)" stroke="#3730a3" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M90 0 L60 200 M90 0 L120 200"/>
    <path d="M70 130 L110 130"/>
    <path d="M52 200 L128 200"/>
    <path d="M40 200 L20 470 M140 200 L160 470"/>
    <path d="M35 300 Q90 340 145 300"/>
    <path d="M26 400 L154 400"/>
    <path d="M20 470 L160 470"/>
  </g>

  <!-- ligne d'horizon -->
  <line x1="120" y1="700" x2="1480" y2="700" stroke="#c7cbe0" stroke-width="2"/>

  <text x="130" y="600" font-family="Georgia, serif" font-size="66" font-style="italic" font-weight="600" fill="#191821">Agences SEO</text>
  <text x="132" y="672" font-family="Arial, sans-serif" font-size="26" letter-spacing="8" fill="#4338ca">PARIS · COMPARATIF 2026</text>
</svg>
